<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Veículo - PUCaronas</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.4.1/dist/css/bootstrap.min.css" crossorigin="anonymous">
    <style>
        .card {
            margin-top: 5vh;
            padding: 2rem;
            border-radius: 1rem;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        body {
            background-color: #f8f9fa;
        }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg" style="background-color: darkred;">
  <a class="navbar-brand text-white" href="#">PUCaronas</a>
  <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
    <span class="navbar-toggler-icon"></span>
  </button>
  <div class="collapse navbar-collapse" id="navbarNav">
    <ul class="navbar-nav">
      <li class="nav-item active">
        <a class="nav-link text-white" href="../caronas/logado_home.html">Home <span class="sr-only">(current)</span></a>
      </li>
      <li class="nav-item">
        <a class="nav-link text-white" href="../caronas/caronas.html">Caronas</a>
      </li>
      <li class="nav-item">
        <a class="nav-link text-white" href="../usuario/login.html" onclick="sessionStorage.clear()">Sair</a>
      </li>
    </ul>
  </div>
</nav>

<div class="container d-flex justify-content-center align-items-center" style="min-height: 90vh;">
    <div class="card w-100" style="max-width: 500px;">
        <h3 class="text-center mb-4">Editar Veículo</h3>
        <form>
            <div class="form-group">
                <label for="modelo">Modelo:</label>
                <input type="text" class="form-control" id="modelo" name="modelo">
            </div>
            <div class="form-group">
                <label for="placa">Placa:</label>
                <input type="text" class="form-control" id="placa" name="placa">
            </div>
            <div class="form-group">
                <label for="n_assentos">Número de Assentos:</label>
                <input type="number" class="form-control" id="n_assentos" name="n_assentos">
            </div>
            <h1 id="resultado"></h1>
            <button type="button" class="btn btn-primary btn-block" id="btn">Salvar Alterações</button>
        </form>
    </div>
</div>
<script>
        const queryString = window.location.search;
        const urlParams = new URLSearchParams(queryString);
        const id_carro = urlParams.get('id');
document.addEventListener("DOMContentLoaded", async (event) => {
        const nome = sessionStorage.getItem('nome');
        const cargo = sessionStorage.getItem('cargo');
        if (!nome || cargo !== 'motorista') {
            window.location.href = '../usuario/login.html';
        }
        if (id_carro) {
            const obj = await pegar_dados(id_carro);
            preencher(obj);
        }
    });

    async function pegar_dados(id){
        let requisicao = await fetch(`../../api/carros.php?id=${id_carro}` , {
            method: 'GET',
            headers:{
                'Content-Type': 'application/json'
            }
        })
        const resposta = await requisicao.json();
        return resposta;
    }

    function preencher(obj){
        document.getElementById('modelo').value = obj.modelo;
        document.getElementById('placa').value = obj.placa;
        document.getElementById('n_assentos').value = obj.n_assentos;
    }


btn = document.getElementById("btn");
btn.addEventListener('click',enviar);
dormir = (tempo) => new Promise(res => setTimeout(res,tempo));

        async function enviar(){
            try {
            obj = {};
            const id_motorista = sessionStorage.getItem('id');
            const modelo = document.getElementById('modelo').value;
            const placa = document.getElementById('placa').value;
            const n_assentos = document.getElementById('n_assentos').value;
            let requisicao = await fetch(`../../api/carros.php?id=${id_carro}` , {
                method: 'PUT',
                headers:{
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({id_motorista,modelo,placa,n_assentos})
            })
        const resposta = await requisicao.json(); 
        console.log("Resposta:", resposta); 
        resultado = document.getElementById('resultado');
        if (resposta.message = "veiculo ok"){
            resultado.innerHTML = "Veículo adicionado com sucesso";
            dormir(1000);
            window.location.href = 'meus_carros.html';
        }
        else {
            resultado.innerHTML = "Erro de dados, ajuste os dados.";
            dormir(1000);
            resultado.innerHTML = "";
        }
    }
     catch (err){
                console.log(err)
            }
        }

</script>
</body>
</html>
