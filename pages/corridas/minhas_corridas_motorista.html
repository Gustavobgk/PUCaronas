<div class="container d-flex justify-content-center align-items-center" style="min-height: 90vh;">

<!-- Modal -->
<div class="modal fade" id="modalAvaliacao" tabindex="-1" role="dialog" aria-labelledby="exampleModalLabel" aria-hidden="true">
  <div class="modal-dialog" role="document">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="exampleModalLabel">Realizar a avaliação dos usuários da corrida </h5>
        <button type="button" class="close" data-dismiss="modal" aria-label="Close">
          <span aria-hidden="true">&times;</span>
        </button>
      </div>
      <div class="modal-body">
                        <select class="form-select form-control" aria-label="Selecione o participante" id="id_user">
                </select>
                      <div class="mt-3"> <input type="number" id="nota"></div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-dismiss="modal">Cancelar</button>
        <button type="button" class="btn btn-primary" onclick="enviarAvaliacao()">Concluir avaliação</button>
      </div>
    </div>
  </div>

    <script>
       document.addEventListener("DOMContentLoaded", (event) => {
    const nome = sessionStorage.getItem('nome');
    const cargo = sessionStorage.getItem('cargo');
    const status = sessionStorage.getItem('status');
    if (cargo !== 'motorista' && cargo !== 'admin') {
        window.location.href = '../usuario/login.html';
    }
    receber();
});



 async function receber(){
            try {
            id_motorista = sessionStorage.getItem('id');
            let requisicao = await fetch(`../../api/corridas.php?id_motorista=${id_motorista}` , {
                method: 'GET',
                headers:{
                    'Content-Type': 'application/json'
                }
            })
            
        const resposta = await requisicao.json(); 
        console.log("Resposta:", resposta);
        
        const lista = document.getElementById('corridas-lista');
        lista.innerHTML = ""; 
        let contador = 0;
        resposta.forEach(corrida => {

                const labels = {
        'pendente':     'Pendente',
        'em_andamento': 'Em andamento',
        'finalizada':   'Finalizada',
        'cancelada':    'Cancelada'
    };
    const ap = labels[corrida.status] || corrida.status;
    const botoes = corrida.status === 'pendente' ? `
        <a href="#" class="btn btn-outline-primary btn-sm ml-2" onclick="atualizarStatus(${corrida.id_carona},'em_andamento')">Iniciar</a>
        <a href="#" class="btn btn-outline-danger btn-sm ml-2" onclick="atualizarStatus(${corrida.id_carona},'cancelada')">Cancelar</a>
    ` : corrida.status === 'em_andamento' ? `
        <a href="#" class="btn btn-outline-info btn-sm ml-2" onclick="atualizarStatus(${corrida.id_carona},'finalizada')">Finalizar</a>
        <a href="#" class="btn btn-outline-danger btn-sm ml-2" onclick="atualizarStatus(${corrida.id_carona},'cancelada')">Cancelar</a>
    ` : corrida.status === 'finalizada' ? `
        <a href="#" class="btn btn-outline-warning btn-sm ml-2"  data-toggle="modal" onclick="abrirModal(${corrida.id_carona})">Avaliar</a>
    ` : '';

            lista.innerHTML += `
                <div class="card mb-2">
                    <div class="card-body">
                        <h5 class="card-title mb-1" style = "position: relative;
  bottom: 2.5vh;
  font-size: 1.3vw;
  right: 2vw;">Carona : ${corrida.titulo}</h5>
                        <p class="mb-1">Origem: <b>${corrida.origem}</b></p>
                        <p class="mb-1">Destino: <b>${corrida.destino}</b></p>
                        <p class="mb-1">Passageiros: <b>${corrida.passageiros}</b></p>
                        <span class="badge badge-primary">${ap} </span>
                        <div class="mt-4 d-flex justify-content-center align-items-center" id="btn-lista">
                     ${botoes}
                            </div>
                    </div>
                </div>
            `;
            contador +=1;

                       

        });





    } 
            catch (err) {
                console.log(err);
            }




}

async function atualizarStatus(id_carona,acao){
try{
    id_motorista = sessionStorage.getItem('id');
    let requisicao = await fetch(`../../api/corridas.php?id_carona=${id_carona}&id_motorista=${id_motorista}` , {
        method: 'POST',
        headers:{
            'Content-Type': 'application/json'
        },
        body : JSON.stringify({status: acao})
                })

                 const resposta = await requisicao.json(); 
        console.log("Resposta:", resposta);
        lista = document.getElementById('corridas-lista');
        lista.innerHTML = "";
        receber();        
}
catch(err){
    console.log("erro é:" + err);
    alert(err);
}
}
    // <a href="#" class="ml-2  btn btn-outline-primary" onclick="atualizarStatus(${corrida.id_carona},'em_andamento')" id="iniciar">Iniciar</a>
    //                     <a href="#" class="ml-2 mr-2 btn btn-outline-info" onclick="atualizarStatus(${corrida.id_carona},'finalizada')" id="finalizar">Finalizar</a>
    //                     <a href="#" class="ml-2 btn btn-outline-danger" onclick="atualizarStatus(${corrida.id_carona},'cancelada')" id="cancelar">Cancelar</a>
                    


let id_carona_atual;

    async function abrirModal(id_carona){
        id_carona_atual = id_carona;
        const id_motorista=sessionStorage.getItem('id');
        const req = await fetch(`../../api/avaliacoes.php?id_carona=${id_carona}&id_motorista=${id_motorista}&tipo=motorista_para_passageiro`);
        const passageiros = await req.json();
        const select = document.getElementById('id_user');
        select.innerHTML = '<option selected disabled>Selecione o participante</option>';
         if (passageiros.length === 0) {
        select.innerHTML += '<option disabled>Todos já foram avaliados!</option>';
    } else {
        passageiros.forEach(p => {
            select.innerHTML += `<option value="${p.id_passageiro}">${p.nome || p.id_passageiro}</option>`;
        });
    }
    $('#modalAvaliacao').modal('show');
    }

    async function enviarAvaliacao() {
    const id_passageiro = document.getElementById('id_user').value;
    const id_motorista = sessionStorage.getItem('id');
    notaSelecionada = document.getElementById('nota').value;
    const nota = notaSelecionada; // da lógica de estrelas
     console.log("id_passageiro:", id_passageiro);
    console.log("id_motorista:", id_motorista);
    console.log("nota:", nota);



    if (!nota) { alert('Selecione uma nota!'); return; }

    const req = await fetch(
        `../../api/avaliacoes.php?id_passageiro=${id_passageiro}&id_motorista=${id_motorista}`,
        {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ nota, tipo: 'motorista_para_passageiro' })
        }
    );
    const resposta = await req.json();
    if (resposta.message) {
        $('#modalAvaliacao').modal('hide');
        alert('Avaliação enviada!');
        receber();
    }
}
    </script>
