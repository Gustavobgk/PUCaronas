<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Admin - Aprovação</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #8b0000 0%, #2b0000 100%);
            background-attachment: fixed;
            min-height: 100vh;
            font-family: 'Poppins', sans-serif;
            color: white;
            padding-bottom: 50px;
        }

        .main-container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 30px;
            margin-top: 50px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.3);
        }

        .table-container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 15px;
            overflow: hidden;
            margin-top: 20px;
        }

        .table {
            margin-bottom: 0;
            font-size: 0.85rem;
        }

        .table thead {
            background: #8b0000;
            color: white;
        }

        .status-badge {
            padding: 5px 12px;
            border-radius: 50px;
            font-size: 0.8rem;
            font-weight: 600;
        }

        .btn-approve {
            background: #28a745;
            color: white;
            border-radius: 8px;
            transition: all 0.3s;
        }

        .btn-approve:hover {
            background: #218838;
            transform: scale(1.05);
            color: white;
        }

        .btn-delete {
            background: #dc3545;
            color: white;
            border-radius: 8px;
            transition: all 0.3s;
        }

        .navbar {
            background: rgba(0, 0, 0, 0.3) !important;
            backdrop-filter: blur(10px);
        }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark">
    <div class="container">
        <a class="navbar-brand font-weight-bold" href="#">PUCaronas ADMIN</a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="logado_home.html">Voltar para Home</a></li>
                <li class="nav-item"><a class="nav-link" href="../usuario/login.html" onclick="sessionStorage.clear()">Sair</a></li>
            </ul>
        </div>
    </div>
</nav>

<div class="container">
    <div class="main-container">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1 class="h3 mb-0 font-weight-bold">Gerenciamento de Usuários</h1>
            <span class="badge bg-warning text-dark">Pendentes de Aprovação</span>
        </div>

        <div class="table-container table-responsive">
            <table class="table table-hover align-middle">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Nome</th>
                        <th>E-mail</th>
                        <th>Senha</th>
                        <th>Nascimento</th>
                        <th>Status</th>
                        <th>Cargo</th>
                        <th>Documento</th>
                        <th class="text-center" style="min-width: 180px;">Ações</th>
                    </tr>
                </thead>
                <tbody id="tbody-usuarios">
                    <!-- Usuarios em espera via JS -->
                </tbody>
            </table>
        </div>
    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        const cargo = sessionStorage.getItem('cargo');
        if (cargo !== 'admin') {
            window.location.href = '../usuario/login.html';
            return;
        }
        carregarUsuarios();
    });

    async function carregarUsuarios() {
        try {
            const requisicao = await fetch('../../api/usuario.php');
            const usuarios = await requisicao.json();
            const tbody = document.getElementById('tbody-usuarios');
            tbody.innerHTML = '';

            usuarios.forEach(user => {
                // Cores para o Status
                let statusClass = 'bg-secondary';
                if (user.status === 'aprovado' || user.status === 'ativo') statusClass = 'bg-success';
                if (user.status === 'espera') statusClass = 'bg-warning text-dark';
                if (user.status === 'banido' || user.status === 'reprovado') statusClass = 'bg-danger';

                const docLink = user.doc ? `<a href="${user.doc}" target="_blank" class="btn btn-sm btn-outline-primary">Ver Doc</a>` : '---';
                
                tbody.innerHTML += `
                    <tr>
                        <td>${user.id}</td>
                        <td><b>${user.nome}</b></td>
                        <td>${user.email}</td>
                        <td><code class="text-muted">${user.senha_hash}</code></td>
                        <td>${user.data_nasc}</td>
                        <td><span class="status-badge ${statusClass}">${user.status}</span></td>
                        <td><span class="badge bg-dark">${user.cargo}</span></td>
                        <td>${docLink}</td>
                        <td class="text-center">
                            <div class="btn-group">
                                ${user.status === 'espera' ? `<button class="btn btn-approve btn-sm me-1" onclick="aprovar(${user.id})">Aprovar</button>` : ''}
                                <a href="../usuario/alterar_usuario.html?id=${user.id}" class="btn btn-primary btn-sm me-1">Editar</a>
                                <button class="btn btn-delete btn-sm" onclick="deletar(${user.id})">Deletar</button>
                            </div>
                        </td>
                    </tr>
                `;
            });
        } catch (err) {
            console.error("Erro ao carregar usuários:", err);
        }
    }

    async function aprovar(id) {
        if(confirm("Confirmar aprovação deste usuário?")) {
            const res = await fetch(`../../api/usuario.php?id=${id}`);
            const user = await res.json();
            user.status = 'aprovado';

            await fetch(`../../api/usuario.php?id=${id}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(user)
            });
            location.reload();
        }
    }

    async function deletar(id) {
        if(confirm("CUIDADO: Deseja realmente excluir este usuário?")) {
            await fetch(`../../api/usuario.php?id=${id}`, { method: 'DELETE' });
            location.reload();
        }
    }
</script>
</body>
</html>
