<div class="container d-flex justify-content-center align-items-center" style="min-height: 90vh;">
    <div class="card">
        <h3 class="text-center mb-4">Alterar Carona</h3>
        <form id="formAlterarCarona">
            <div class="form-group">
                <label for="id_veiculo">Seu Veículo:</label><br>
                <select class="form-select form-control" aria-label="Selecione seu veículo" id="id_veiculo">
                    <option selected disabled>Selecione seu carro</option>
                </select>
            </div>
            <div class="form-group">
                <label for="titulo">Título:</label>
                <input type="text" class="form-control" name="titulo" id="titulo">
            </div>
            <div class="form-group">
                <label for="descricao">Descrição:</label>
                <input type="text" class="form-control" name="descricao" id="descricao">
            </div>
            <div class="form-group">
                <label for="mensagem">Mensagem:</label>
                <input type="text" class="form-control" name="mensagem" id="mensagem">
            </div>
            <div class="form-group">
                <label for="vagas">Vagas:</label>
                <input type="number" class="form-control" name="vagas" id="vagas">
            </div>
                        <div class="form-group">
                <label for="vagas">Status:</label>
                <select id="status" class= "form-control" name="status">
  <option value="aberta">Aberta</option>
  <option value="Fechada">Fechada</option>
</select>            </div>
            <div class="form-group">
                <label for="origem">Origem:</label>
                <input type="text" class="form-control" name="origem" id="origem">
            </div>
            <div class="form-group">
                <label for="destino">Destino:</label>
                <input type="text" class="form-control" name="destino" id="destino">
            </div>
            <button type="button" id="btn" class="btn btn-primary btn-block">Salvar Alterações</button>
            <h1 id="resultado" class="text-center mt-3" style="font-size:1.2rem;"></h1>
        </form>
    </div>
</div>
<script>

    const dormir = (tempo) => new Promise(res => setTimeout(res,tempo));
           async function carregar_dados(){
        obj = await pegar_dados(id);
        preencher(obj);
    }
    const queryString = window.location.search;
    const urlParams = new URLSearchParams(queryString);
    const id = urlParams.get('id');
    const nome = sessionStorage.getItem('nome');
    const cargo = sessionStorage.getItem('cargo');

    if (!id || cargo != "motorista"){
        window.location.href = 'logado_home.html';
    }
    else{
        carregar_dados();
    }



    btn = document.getElementById("btn");
btn.addEventListener('click',enviar);
        async function enviar(){
    const resultado = document.getElementById('resultado');
        try {
            const id_motorista = sessionStorage.getItem('id');
            const id_veiculo = document.getElementById('id_veiculo').value;
            const titulo = document.getElementById('titulo').value;
            const descricao = document.getElementById('descricao').value;
            const mensagem = document.getElementById('mensagem').value;
            var e = document.getElementById("status");
            var status = e.value; // Pega o valor (aberta, Fechada) em vez do texto visível
            const vagas = document.getElementById('vagas').value;
            const origem = document.getElementById('origem').value;
            const destino = document.getElementById('destino').value;

    
            const requisicao = await fetch(`../../api/carona.php?id=${id}`, {
                method: 'PUT',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ id_motorista, id_veiculo, titulo, descricao, mensagem, status , vagas, origem, destino })
            });

            const resposta = await requisicao.json();
            console.log("Resposta da atualização de carona:", resposta);

            if (resposta.message == "carona atualizada") { 
                resultado.innerHTML = "Carona atualizada com sucesso!";
                await dormir(1000); 
                window.location.href = 'gerenciar.html';
            } else {
                resultado.innerHTML = "Erro ao atualizar carona: " + (resposta.message || "Dados inválidos!!"); 
            }

        } catch (err) {
            console.error("Erro ao atualizar carona:", err); 
            resultado.innerHTML = "Erro ao atualizar carona.";
        }

        }









    async function pegar_dados(){
        let requisicao = await fetch(`../../api/carona.php?id=${id}` , {
                method: 'GET',
                headers:{
                    'Content-Type': 'application/json'
                }
            })
             const resposta = await requisicao.json();
             return resposta
             
    }
    async function preencher(obj){
        document.getElementById('titulo').value = obj.titulo;
        document.getElementById('descricao').value = obj.descricao;
        document.getElementById('mensagem').value = obj.mensagem;
        document.getElementById('vagas').value = obj.vagas;
        document.getElementById('origem').value = obj.origem;
        document.getElementById('destino').value = obj.destino;        
        document.getElementById("status").value = obj.status; 
        carregarEPreencherVeiculos(obj.id_veiculo);
    }
    

    async function carregar_veiculos() {
        const id_motorista = sessionStorage.getItem("id");
        if (!id_motorista) {
            console.error("ID do motorista não encontrado na sessão.");
            return [];
        }
        try {
            const requisicao = await fetch(`../../api/carros.php?id_motorista=${id_motorista}`, {
                method: 'GET',
                headers: {
                    'Content-Type': 'application/json'
                }
            });
            if (!requisicao.ok) {
                throw new Error(`Erro req: ${requisicao.statusText}`);
            }
            const veiculos = await requisicao.json();
            console.log("Veículos:", veiculos);
            return veiculos;
        } catch (err) {
            console.error("Erro ao carregar: ", err);
            return [];
        }
    }

    function preencher_veiculos(veiculos,carona_veiculo_id) {
        const selectCarro = document.getElementById("id_veiculo");
        if (veiculos.length === 0) {
            selectCarro.innerHTML += `<option disabled>Nenhum veículo cadastrado</option>`;
        } else {
            veiculos.forEach(veiculo => {
                if (veiculo.id == carona_veiculo_id) {
                selectCarro.innerHTML += `<option value="${veiculo.id}" selected>${veiculo.modelo} - ${veiculo.placa}</option>`    
                
                }
                else {
                selectCarro.innerHTML += `<option value="${veiculo.id}">${veiculo.modelo} - ${veiculo.placa}</option>`
            }
            });
        }
    }

    async function carregarEPreencherVeiculos(carona_veiculo_id) {
        const veiculos = await carregar_veiculos();
        preencher_veiculos(veiculos,carona_veiculo_id);
    }

</script>
</body>
