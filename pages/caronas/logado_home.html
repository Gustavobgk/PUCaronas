<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PUCaronas - Área do Usuário</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.4.1/dist/css/bootstrap.min.css" crossorigin="anonymous">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #8b0000 0%, #2b0000 100%);
            background-attachment: fixed;
            min-height: 100vh;
            margin: 0;
            font-family: 'Poppins', sans-serif;
        }

        .container {
            padding-top: 5vh;
        }

        .card {
            padding: 3rem;
            border-radius: 2rem;
            background: rgba(255, 255, 255, 0.1) !important;
            backdrop-filter: blur(15px) !important;
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2) !important;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.3);
            color: white;
            transition: transform 0.3s ease;
        }

        .card:hover {
            transform: scale(1.02);
        }

        .btn-custom {
            border-radius: 12px;
            padding: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            margin-bottom: 1rem;
            border: none;
        }

        .btn-primary-glass {
            background: rgba(0, 123, 255, 0.6);
            color: white;
        }

        .btn-primary-glass:hover {
            background: rgba(0, 123, 255, 0.9);
            box-shadow: 0 0 20px rgba(0, 123, 255, 0.5);
            color: white;
        }

        .btn-success-glass {
            background: rgba(40, 167, 69, 0.6);
            color: white;
        }

        .btn-success-glass:hover {
            background: rgba(40, 167, 69, 0.9);
            box-shadow: 0 0 20px rgba(40, 167, 69, 0.5);
            color: white;
        }

        .admin-badge {
            background: gold;
            color: black;
            padding: 5px 15px;
            border-radius: 50px;
            font-weight: bold;
            display: inline-block;
            margin-bottom: 1rem;
        }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg" style="background-color: darkred;">
  <a class="navbar-brand text-white" href="#">PUCaronas</a>
  <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
    <span class="navbar-toggler-icon"></span>
  </button>
  <div class="collapse navbar-collapse" id="navbarNav">
    <ul class="navbar-nav">
      <li class="nav-item active">
        <a class="nav-link text-white" href="#">Home <span class="sr-only">(current)</span></a>
      </li>
      <li class="nav-item">
        <a class="nav-link text-white" href="caronas.html">Caronas</a>
      </li>
      <li class="nav-item">
        <a class="nav-link text-white" href="../usuario/login.html" onclick="sessionStorage.clear()">Sair</a>
      </li>
    </ul>
  </div>
</nav>
<div class="container d-flex justify-content-center align-items-center" style="min-height: 80vh;">
    <div class="card w-50 text-center">
        <h2 class="mb-4 font-weight-bold">Bem-vindo ao PUCaronas!</h2>
        <p id="user-greeting" class="lead mb-4" style="color: #ddd;"></p>
        
        <div id="div-passageiro" style="display:none;">
            <a href="caronas.html" class="btn btn-primary-glass btn-custom btn-block">Ver Caronas Disponíveis</a>
        </div>
        
        <div id="div-motorista" style="display:none;">
            <a href="caronas.html" class="btn btn-primary-glass btn-custom btn-block">Ver Caronas</a>
            <a href="gerenciar.html" class="btn btn-primary-glass btn-custom btn-block">Painel de Controle</a>
            <a href="criar_carona.html" class="btn btn-success-glass btn-custom btn-block">Oferecer Nova Carona</a>
            <a href="../carro/meus_carros.html" class="btn btn-outline-light btn-custom btn-block">Gerenciar Meus Veículos</a>
        </div>

        <div id="div-admin" style="display:none;">
            <div class="admin-badge">ADMINISTRADOR</div>
            <a href="admin_usuarios.html" class="btn btn-primary-glass btn-custom btn-block">Gerenciar Aprovações</a>
            <a href="caronas.html" class="btn btn-outline-light btn-custom btn-block">Monitorar Sistema</a>  
        </div>
    </div>
</div>
<script>
    const cargo = sessionStorage.getItem('cargo');
    const nome = sessionStorage.getItem('nome');
    document.getElementById('user-greeting').innerText = `Olá, ${nome}! Selecione uma ação abaixo:`;

    if (cargo === 'motorista') {
        document.getElementById('div-motorista').style.display = 'block';
    } else if (cargo === 'passageiro') {
        document.getElementById('div-passageiro').style.display = 'block';
    } else if (cargo === 'admin') {
        document.getElementById('div-admin').style.display = 'block';
    } else {
        window.location.href = '../usuario/login.html';
    }
</script>
</body>
</html>
