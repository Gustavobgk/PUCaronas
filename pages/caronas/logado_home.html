<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PUCaronas - Área do Usuário</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.4.1/dist/css/bootstrap.min.css" crossorigin="anonymous">
    <style>

        body {
        
        background: linear-gradient(135deg, #8b0000 0%, #2b0000 100%);
        background-attachment: fixed;
        min-height: 100vh;
        margin: 0;
    }

    
    .card {
    margin-top: 10vh;
    padding: 2rem;
    border-radius: 1.5rem;
    background: rgba(255, 255, 255, 0.75) !important;
    backdrop-filter: blur(20px) !important;
    -webkit-backdrop-filter: blur(20px);
    
    
    border: 2px solid rgba(255, 255, 255, 0.9) !important;
    
    /* essa parte eu fiz para deixar um efeito de vidro estilo macos */
    box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4), 
                inset 0 0 10px rgba(255, 255, 255, 0.5);
    
    transition: all 0.3s ease;
}


        
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg" style="background-color: darkred;">
  <a class="navbar-brand text-white" href="#">PUCaronas</a>
  <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
    <span class="navbar-toggler-icon"></span>
  </button>
  <div class="collapse navbar-collapse" id="navbarNav">
    <ul class="navbar-nav">
      <li class="nav-item active">
        <a class="nav-link text-white" href="#">Home <span class="sr-only">(current)</span></a>
      </li>
      <li class="nav-item">
        <a class="nav-link text-white" href="caronas.html">Caronas</a>
      </li>
      <li class="nav-item">
        <a class="nav-link text-white" href="../usuario/login.html" onclick="sessionStorage.clear()">Sair</a>
      </li>
    </ul>
  </div>
</nav>
<div class="container d-flex justify-content-center align-items-center" style="min-height: 80vh;">
    <div class="card w-50 text-center">
        <h2 class="mb-4">Bem-vindo ao PUCaronas!</h2>
        <div id="div-passageiro" style="display:none;">
            <p>Você está logado como <b>passageiro</b>.</p>
            <a href="caronas.html" class="btn btn-primary btn-block">Ver Caronas</a>
        </div>
        <div id="div-motorista" style="display:none;">
            <p>Você está logado como <b>motorista</b>.</p>
            <a href="caronas.html" class="btn btn-primary btn-block mb-2">Ver Caronas</a>
            <a href="gerenciar.html" class="btn btn-primary btn-block mb-2">Ver Minhas Caronas</a>
            <a href="criar_carona.html" class="btn btn-success btn-block">Criar Carona</a>
            <a href="../carro/meus_carros.html" class="btn btn-info btn-block">Ver meus carros</a>
            
           
        </div>
               <div id="div-admin" style="display:none;">
            <p>Você está logado como <b>ADMIN</b>.</p>
            <a href="caronas.html" class="btn btn-primary btn-block mb-2">Ver Caronas</a>  
           
        </div>
    </div>
</div>
<script>
    const cargo = sessionStorage.getItem('cargo');
    if (cargo === 'motorista') {
        document.getElementById('div-motorista').style.display = 'block';
    } else if (cargo === 'passageiro') {
        document.getElementById('div-passageiro').style.display = 'block';
    } else if (cargo === 'admin') {
        document.getElementById('div-admin').style.display = 'block';
    } else {
        window.location.href = '../usuario/login.html';
    }
</script>
</body>
</html>
