<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - PUCaronas</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.4.1/dist/css/bootstrap.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #8b0000 0%, #2b0000 100%);
            background-attachment: fixed;
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(15px);
            border-radius: 2rem;
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4);
            padding: 3rem;
            width: 100%;
            max-width: 450px;
        }
        .form-control {
            border-radius: 50px;
            padding: 1.5rem 1.2rem;
            border: 1px solid #ddd;
        }
        .btn-puc {
            background: darkred;
            color: white;
            border-radius: 50px;
            font-weight: 600;
            padding: 0.8rem;
            transition: 0.3s;
            border: none;
        }
        .btn-puc:hover {
            background: #a00000;
            color: white;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg" style="background-color: darkred;">
  <a class="navbar-brand text-white" style="color: white;" href="#">PUCaronas</a>
  <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
    <span class="navbar-toggler-icon"></span>
  </button>
  <div class="collapse navbar-collapse" id="navbarNav">
    <ul class="navbar-nav">
      <li class="nav-item active">
        <a class="nav-link text-white" href="../home.html">Home <span class="sr-only">(current)</span></a>
      </li>
        <li class="nav-item">
        <a class="nav-link text-white" href="../caronas/caronas.html">Caronas</a>
      </li>
      <li class="nav-item">
        <a class="nav-link text-white" href="login.html">Log in</a>
      </li>
      <li class="nav-item">
        <a class="nav-link text-white" href="registro.html">Registrar-se</a>
      </li>
    </ul>
  </div>
</nav>
<div class="container d-flex justify-content-center align-items-center" style="min-height: 90vh;">
  <div class="glass-card">
    <h3 class="text-center mb-4 fw-bold">Login</h3>
    <form id="formLogin">
        <div class="form-group">
        <label for="">Email:</label>
        <input class="form-control" style="width: 100%;" placeholder="seuemail@pucpr.edu.br" type="email" id="email">
        </div>
        <div class="form-group">
        <label for="">Senha:</label>
        <input class="form-control" style="width: 100%;" placeholder="Sua senha" type="password" id="senha">
        </div>
        <button id="enviar" type="button" class="btn btn-puc btn-block">Entrar</button>
        <div class="text-center mt-3">
            <a href="registro.html" class="text-muted small">Registrar-se</a>
        </div>
        <p id="resultado" class="text-center mt-3" style="font-size: 1rem; font-weight: bold;"></p>
    </form>
  </div>
</div>





   <script>
    let nome = sessionStorage.getItem('nome');
    let cargo = sessionStorage.getItem('cargo');
    if (nome && cargo) {
        window.location.href = '../caronas/logado_home.html';
    }
    btn = document.getElementById('enviar');
    btn.addEventListener('click',login);
    
    
    
    
    async function login(){
        email = document.getElementById('email').value;
        senha_hash = document.getElementById('senha').value;
        requisicao = await fetch('../../api/usuario.php?action=login', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({email,senha_hash})
});

    const resposta = await requisicao.json(); 
    const resultado = document.getElementById("resultado");
    const dormir = (tempo) => new Promise(res => setTimeout(res,tempo));

    if(resposta.message == "adm login ok" || resposta.message == "Login ok") { 
            dados = await pegar_dados(email);
            sessionStorage.setItem("nome", dados.nome); 
            sessionStorage.setItem("cargo", dados.cargo); 
            sessionStorage.setItem("id", dados.id); 
            sessionStorage.setItem("status", dados.status);
            resultado.innerHTML = "Usuário logado com sucesso!!";
            resultado.style.color = "green";
            await dormir(1000);
            window.location.href = '../caronas/logado_home.html';
    } else if (resposta.message == "login espera"){
                    dados = await pegar_dados(email);
                    sessionStorage.setItem("status", dados.status); 
        resultado.innerHTML = "Usuário em espera!!";
        await dormir(1500);
        resultado.innerHTML = "";
        window.location.href = '../home.html';

        }
    else {
        resultado.innerHTML = "Email ou senha errados!!";
        await dormir(1500);
        resultado.innerHTML = "";
        document.getElementById('formLogin').reset();
        

    }

    }

    async function pegar_dados(email){

            requisicao = await fetch(`../../api/usuario.php?email=${email}`, {
    method: 'GET',
    headers: { 'Content-Type': 'application/json' },
});


    const resposta = await requisicao.json(); 
    return resposta;
    }  
    
    
    
    </script>
</body>
</html>
