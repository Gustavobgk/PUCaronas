<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerenciar Aplicações - Motorista</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.4.1/dist/css/bootstrap.min.css" crossorigin="anonymous">
<style>
            .card {
            margin-top: 5vh;
            padding: 2rem;
            border-radius: 1rem;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        body {
            background-color: #f8f9fa;
        }
</style>
</head>
<body>
    <nav class="navbar navbar-expand-lg" style="background-color: darkred;">
  <a class="navbar-brand text-white" href="#">PUCaronas</a>
  <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
    <span class="navbar-toggler-icon"></span>
  </button>
  <div class="collapse navbar-collapse" id="navbarNav">
    <ul class="navbar-nav">
      <li class="nav-item active">
        <a class="nav-link text-white" href="../caronas/logado_home.html">Home <span class="sr-only">(current)</span></a>
      </li>
      <li class="nav-item">
        <a class="nav-link text-white" href="../caronas/caronas.html">Caronas</a>
      </li>
      <li class="nav-item">
        <a class="nav-link text-white" href="../usuario/login.html" onclick="sessionStorage.clear()">Sair</a>
      </li>
    </ul>
  </div>
</nav>

<div class="container d-flex justify-content-center align-items-center" style="min-height: 90vh;">
    <div class="card w-100" style="max-width: 500px;">
        <h3 class="text-center mb-4">Aplicações de Caronas</h3>
        <div class="text-center mb-3">
            <a href="../caronas/caronas.html" class="btn btn-primary">Aplicar para mais caronas</a>
        </div>
        <div id="aplicacoes-lista" class="mb-3">


            
        </div>
    </div>
</div>
    <script>
       document.addEventListener("DOMContentLoaded", (event) => {
    const nome = sessionStorage.getItem('nome');
    const cargo = sessionStorage.getItem('cargo');
    const status = sessionStorage.getItem('status');
    if (cargo !== 'motorista' && cargo !== 'admin') {
        window.location.href = '../usuario/login.html';
    }
    receber();
});



 async function receber(){
            try {
            id_motorista = sessionStorage.getItem('id');
            let requisicao = await fetch(`../../api/aplicacoes.php?id_motorista=${id_motorista}` , {
                method: 'GET',
                headers:{
                    'Content-Type': 'application/json'
                }
            })
            
        const resposta = await requisicao.json(); 
        console.log("Resposta:", resposta);
        
        const lista = document.getElementById('aplicacoes-lista');
        lista.innerHTML = ""; 
        let contador = 0;
        resposta.forEach(aplicacao => {

        if (aplicacao.status === "pendente"){ // Corrigido: de '=' para '==='
            ap = "Pendente"; 
        }
        else if (aplicacao.status === "aprovado"){ // Corrigido: de '=' para '==='
            ap = "Aprovado"; 
        }
        else if (aplicacao.status === "recusado"){ // Corrigido: de '=' para '==='
            ap = "Recusado"; 
        }
            lista.innerHTML += `
                <div class="card mb-2">
                    <div class="card-body">
                        <h5 class="card-title mb-1" style = "position: relative;
  bottom: 2.5vh;
  font-size: 1.3vw;
  right: 2vw;">Carona : ${aplicacao.titulo}</h5>
                        <h5 class="card-subtitle mb-1">Status : ${ap}</h5>
                        <p class="mb-1">Passageiro: <b>${aplicacao.nome}</b></p>
                        <span class="badge badge-primary">${aplicacao.vagas} vagas disponíveis</span>
                                                <div class="mt-2 float-right">
                            <a href="" class="btn btn-outline-success btn-sm mr-2" id="btn-aprovar" value="aprovado" onclick="atualizarStatus(${aplicacao.id_aplicacao},'aprovado')">Aprovar</a>
                            <button class="btn btn-outline-danger btn-sm" id = "btn-reprovar" value="recusado" onclick="atualizarStatus(${aplicacao.id_aplicacao},'recusado')">Reprovar</button>
                        </div>
                    </div>
                </div>
            `;
            contador +=1;
        });





    } 
            catch (err) {
                console.log(err);
            }




}

async function atualizarStatus(id_aplicacao,status_ap){
    try {
               let requisicao = await fetch(`../../api/aplicacoes.php?id_aplicacao=${id_aplicacao}` , {
                method: 'PUT',
                headers:{
                    'Content-Type': 'application/json'
                },
                body : JSON.stringify({status: status_ap})
                        })
        const resposta = await requisicao.json(); 
        console.log("Resposta:", resposta);
        aplicacoes = document.getElementById('aplicacoes-lista');
        aplicacoes.innerHTML = "";
        receber(); 
}
catch (err){
    console.log("erro é:" + err);
    alert(err);
}
}



    </script>
</body>
</html>
