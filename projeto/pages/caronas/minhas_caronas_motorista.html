<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minhas Caronas - PUCaronas</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.4.1/dist/css/bootstrap.min.css" crossorigin="anonymous">
    <style>
        .card {
            margin-top: 5vh;
            padding: 2rem;
            border-radius: 1rem;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        body {
            background-color: #f8f9fa;
        }
        .carona-lista {
            max-height: 50vh;
            overflow-y: auto;
        }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg" style="background-color: darkred;">
  <a class="navbar-brand text-white" style="color: white;" href="#">PUCaronas</a>
</nav>
<div class="container d-flex justify-content-center align-items-center" style="min-height: 90vh;">
    <div class="card w-100" style="max-width: 700px;">
        <img src="../assets/pucaronas.png" alt="PUCaronas Logo" class="mx-auto d-block mb-3" style="max-width: 120px;">
        <h3 class="text-center mb-4">Minhas Caronas</h3>
        <div class="form-group">
            <input type="text" class="form-control" placeholder="Pesquisar caronas...">
        </div>
        <div class="carona-lista">
            <!-- carona motorista-->
            <div class="card mb-3">
                <div class="card-body">
                    <h5 class="card-title">PUC para Centro</h5>
                    <h6 class="card-subtitle mb-2 text-muted">Veículo: Uno - ABC1234</h6>
                    <p class="card-text"><strong>Descrição:</strong> Saída da PUC às 18h. <br><strong>Frequência:</strong> Segundas e Quartas</p>
                    <span class="badge badge-primary">3 vagas</span>
                    <span class="badge badge-success">Ativa</span>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
