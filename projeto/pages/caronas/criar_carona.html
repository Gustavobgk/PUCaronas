<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Criar Carona</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.4.1/dist/css/bootstrap.min.css" crossorigin="anonymous">
    <style>
        .form-control {
            width: 20vw;
        }
        .card {
            margin-top: 5vh;
            padding: 2rem;
            border-radius: 1rem;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        body {
            background-color: #f8f9fa;
        }
        .btn-link {
            text-decoration: none;
            color: inherit;
        }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg" style="background-color: darkred;">
  <a class="navbar-brand text-white" style="color: white;" href="#">PUCaronas</a>
  <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
    <span class="navbar-toggler-icon"></span>
  </button>
  <div class="collapse navbar-collapse" id="navbarNav">
    <ul class="navbar-nav">
      <li class="nav-item">
        <a class="nav-link text-white" href="../home.html">Home</a>
      </li>
      <li class="nav-item">
        <a class="nav-link text-white" href="caronas.html">Caronas</a>
      </li>
      <li class="nav-item">
        <a class="nav-link text-white" href="../usuario/login.html">Log in</a>
      </li>
      <li class="nav-item">
        <a class="nav-link text-white" href="../usuario/registro.html">Registrar-se</a>
      </li>
    </ul>
  </div>
</nav>
<div class="container d-flex justify-content-center align-items-center" style="min-height: 90vh;">
    <div class="card">
        <h3 class="text-center mb-4">Criar Carona</h3>
        <form id="formCarona">
            <div class="form-group">
                <label for="id_veiculo">Seu Veículo:</label><br>
                <select class="form-select form-control" aria-label="Selecione seu veículo" id="id_veiculo">
                    <option selected disabled>Selecione seu carro</option>
                </select>
                
            </div>
            <div class="form-group">
                <label for="titulo">Título:</label>
                <input type="text" class="form-control" name="titulo" id="titulo">
            </div>
            <div class="form-group">
                <label for="descricao">Descrição:</label>
                <input type="text" class="form-control" name="descricao" id="descricao">
            </div>
            <div class="form-group">
                <label for="mensagem">Mensagem:</label>
                <input type="text" class="form-control" name="mensagem" id="mensagem">
            </div>
            <div class="form-group">
                <label for="vagas">Vagas:</label>
                <input type="number" class="form-control" name="vagas" id="vagas">
            </div>
            <div class="form-group">
                <label for="origem">Origem:</label>
                <input type="text" class="form-control" name="origem" id="origem">
            </div>
            <div class="form-group">
                <label for="destino">Destino:</label>
                <input type="text" class="form-control" name="destino" id="destino">
            </div>
            <button type="button" id="btn" class="btn btn-primary btn-block">Criar Carona</button>
            <h1 id="resultado" class="text-center mt-3" style="font-size:1.2rem;"></h1>
        </form>
    </div>
</div>
<script>
        const dormir = (tempo) => new Promise(res => setTimeout(res,tempo));
       document.addEventListener('DOMContentLoaded', async () => {
        const cargo = sessionStorage.getItem('cargo');
        if (cargo !== 'motorista') {
            window.location.href = '../usuario/login.html';
            return;
        }
        await carregarEPreencherVeiculos();
    });

    async function carregar_veiculos() {
        const id_motorista = sessionStorage.getItem("id");
        if (!id_motorista) {
            console.error("ID do motorista não encontrado na sessão.");
            return [];
        }
        try {
            const requisicao = await fetch(`../../api/carros.php?id_motorista=${id_motorista}`, {
                method: 'GET',
                headers: {
                    'Content-Type': 'application/json'
                }
            });
            if (!requisicao.ok) {
                throw new Error(`Erro req: ${requisicao.statusText}`);
            }
            const veiculos = await requisicao.json();
            console.log("Veículos:", veiculos);
            return veiculos;
        } catch (err) {
            console.error("Erro ao carregar: ", err);
            return [];
        }
    }

    function preencher_veiculos(veiculos) {
        const selectCarro = document.getElementById("id_veiculo");
        if (veiculos.length === 0) {
            selectCarro.innerHTML += `<option disabled>Nenhum veículo cadastrado</option>`;
        } else {
            veiculos.forEach(veiculo => {
                selectCarro.innerHTML += `<option value="${veiculo.id}">${veiculo.modelo} - ${veiculo.placa}</option>`
            });
        }
    }

    async function carregarEPreencherVeiculos() {
        const veiculos = await carregar_veiculos();
        preencher_veiculos(veiculos);
    }

    const btn = document.getElementById("btn");
    btn.addEventListener('click', enviar);

    async function enviar() {
        const resultado = document.getElementById('resultado');
        try {
            const id_motorista = sessionStorage.getItem('id');
            const id_veiculo = document.getElementById('id_veiculo').value;
            const titulo = document.getElementById('titulo').value;
            const descricao = document.getElementById('descricao').value;
            const mensagem = document.getElementById('mensagem').value;
            const vagas = document.getElementById('vagas').value;
            const origem = document.getElementById('origem').value;
            const destino = document.getElementById('destino').value;

    
            const requisicao = await fetch('../../api/carona.php', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ id_motorista, id_veiculo, titulo, descricao, mensagem, vagas, origem, destino })
            });

            const resposta = await requisicao.json();
            console.log("Resposta da criação de carona:", resposta);

            if (resposta.message == "carona sucesso") {
                resultado.innerHTML = "Carona criada com sucesso!";
                dormir(1000);
                window.location.href = 'minhas_caronas_motorista.html';
            } else {
                resultado.innerHTML = "Dados inválidos!!";
            }

        } catch (err) {
            console.error("Erro ao criar carona:", err);
            resultado.innerHTML = "Dados inválidos!!";
        }
    }
</script>
</body>
</html>
